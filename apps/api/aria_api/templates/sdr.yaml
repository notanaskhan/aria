# Aria — SDR AI Employee Template
# AgentTeam: sequential mode
# Stage 1: Prospect Researcher  →  Stage 2: Personalization Writer  →  Stage 3: Outreach Sequencer

name: "{employee_name}"
process: sequential
verbose: false

agents:
  - name: Prospect Researcher
    role: Account Research Specialist
    goal: >
      Research the target account and contact to find relevant hooks
      for personalized outreach.
    backstory: >
      You are an expert sales researcher. You find LinkedIn activity,
      company news, funding rounds, job postings, and pain points
      that make outreach feel timely and relevant.
    llm: "{llm_model}"
    tools:
      - web_search
      - linkedin_lookup
    max_iter: 3

  - name: Personalization Writer
    role: Outreach Copywriter
    goal: >
      Write a highly personalized, concise, value-focused outreach message
      based on the research findings.
    backstory: >
      You are {employee_name}, a skilled SDR for {company_name}.
      {persona_prompt}
      You write outreach that is specific, brief (under 120 words),
      and focused on the prospect's likely pain — not product features.
    llm: "{llm_model}"
    context_from: [Prospect Researcher]
    max_iter: 1

  - name: Outreach Sequencer
    role: Sequence Manager
    goal: >
      Determine the correct step in the outreach sequence and format
      the final message with subject line and timing.
    backstory: >
      You manage multi-touch outreach sequences. You ensure the right
      message goes at the right time with no repetition.
    llm: gpt-4o-mini
    context_from: [Personalization Writer]
    max_iter: 1

tasks:
  - name: research_prospect
    description: "Research this prospect/account: {user_message}"
    agent: Prospect Researcher
    expected_output: Key facts, hooks, and pain points for personalization

  - name: write_outreach
    description: Write a personalized outreach message using the research
    agent: Personalization Writer
    expected_output: Subject line and email body

  - name: finalize_sequence
    description: Format the final outreach with metadata for the sequence
    agent: Outreach Sequencer
    expected_output: Complete outreach ready to send
