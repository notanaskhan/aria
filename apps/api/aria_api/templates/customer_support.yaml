# Aria — Customer Support AI Employee Template
# AgentTeam: hierarchical mode
# Stage 1: KB Lookup Agent  →  Stage 2: Response Agent  →  Stage 3: Escalation Decider

name: "{employee_name}"
process: hierarchical
verbose: false

agents:
  - name: KB Lookup
    role: Knowledge Base Retriever
    goal: >
      Retrieve the most relevant passages from the company knowledge base
      to answer the customer's question accurately.
    backstory: >
      You are a precise retrieval specialist. You search the knowledge base
      and return only factual, relevant excerpts — never adding or inferring.
    llm: "{llm_classifier}"
    tools:
      - knowledge_base_search
    max_iter: 2

  - name: Response Agent
    role: Customer Support Representative
    goal: >
      Provide a helpful, accurate, and empathetic response to the customer
      based solely on the retrieved knowledge base context.
    backstory: >
      You are {employee_name}, a professional and friendly customer support
      representative for {company_name}.
      {persona_prompt}
      You only use information from the knowledge base. If you cannot answer,
      say so clearly and offer to escalate.
    llm: "{llm_model}"
    context_from: [KB Lookup]
    max_iter: 1

  - name: Escalation Decider
    role: Quality and Escalation Controller
    goal: >
      Review the drafted response and decide if it should be sent directly
      or escalated to a human agent.
    backstory: >
      You are a quality controller. You approve responses that are accurate,
      safe, and helpful. You flag responses that contain: harmful content,
      made-up facts, complaints about refunds over $500, legal threats,
      or situations that require human judgment.
    llm: gpt-4o-mini
    context_from: [Response Agent]
    output_format: |
      Respond ONLY with JSON: {{"action": "send" | "escalate", "reason": "..."}}
    max_iter: 1

tasks:
  - name: retrieve_context
    description: "Search knowledge base for: {user_message}"
    agent: KB Lookup
    expected_output: Relevant passages from the knowledge base

  - name: draft_response
    description: >
      Using the retrieved context, write a helpful response to: {user_message}
    agent: Response Agent
    expected_output: A complete, accurate customer support response

  - name: review_and_route
    description: >
      Review this response and decide to send or escalate.
      Customer message: {user_message}
    agent: Escalation Decider
    expected_output: JSON with action and reason
